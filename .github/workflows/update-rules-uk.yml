name: Update UK Financial Rules

on:
  # Run daily at 8am UTC (9am UK winter, 8am UK summer)
  schedule:
    - cron: '0 8 * * *'

  # Manual trigger from GitHub → Actions tab → "Run workflow"
  workflow_dispatch:

  # Also re-runs if the updater script itself changes
  push:
    paths:
      - 'scripts/update-rules-uk.mjs'

jobs:
  update-rules:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set today's date
        id: date
        run: echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run rules updater
        env:
          VITE_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-rules-uk.mjs

      - name: Check if rules-uk.js changed
        id: check_changes
        run: |
          if git diff --quiet app-prototype/rules-uk.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "✅ No changes — all rules confirmed unchanged."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "⚠ rules-uk.js changed — creating PR."
            git diff app-prototype/rules-uk.js
          fi

      - name: Create Pull Request if rules changed
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/rules-uk-${{ steps.date.outputs.today }}
          commit-message: "rules-uk: auto-verified ${{ steps.date.outputs.today }}"
          title: "⚡ UK rules updated — ${{ steps.date.outputs.today }}"
          body: |
            ## Auto-verified UK financial rules

            Claude searched gov.uk and HMRC live and found changes since last run.

            **One-click review** — check the diff, merge if figures look correct.

            Things to check:
            - SIPP IHT status: PROPOSED → ENACTED?
            - Any allowance changes from a recent Budget
            - State pension triple-lock increase

            > Auto-generated by `scripts/update-rules-uk.mjs`
          labels: rules-update,automated
          draft: false

      - name: Log no-change result
        if: steps.check_changes.outputs.changed == 'false'
        run: |
          echo "✅ All UK financial rules confirmed correct as of ${{ steps.date.outputs.today }}."
          echo "No PR needed. Next check tomorrow at 08:00 UTC."
