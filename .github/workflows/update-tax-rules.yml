name: Sync UK Tax Legislation [DISABLED]

# ─────────────────────────────────────────────────────────────────────────────
# DISABLED 2026-06-02. scripts/sync-legislation.js is a NON-FUNCTIONAL STUB:
# it makes no network call (the "live legislation feed" is a hardcoded 5-key
# object), its anomaly gate is inert, and it writes 5 dead snake_case keys plus a
# cosmetic re-encode to UK-2026.1.1.json. It opened auto/tax-sync-* PRs that, off
# a stale base, also regressed the Sonuswealth brand to Caelixa. Do NOT re-enable
# until sync-legislation.js genuinely fetches GOV.UK/HMRC, writes the real bundle
# in the _buildTAX key shapes, and (if wanted) builds per-year/mid-year bundles.
# Schedule + push triggers removed; manual-only so it can't run on a timer.
# ─────────────────────────────────────────────────────────────────────────────
on:
  # Manual trigger ONLY (no schedule) — see DISABLED note above.
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (report changes, no writes)'
        required: false
        default: 'true'
      anomaly_threshold:
        description: 'Anomaly detection threshold (decimal, e.g. 0.10 for 10%)'
        required: false
        default: '0.10'

jobs:
  sync-legislation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    outputs:
      changed: ${{ steps.sync.outputs.changed }}
      anomaly: ${{ steps.sync.outputs.anomaly }}
      anomaly_keys: ${{ steps.sync.outputs.anomaly_keys }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set today's date
        id: date
        run: echo "today=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run legislation sync
        id: sync
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi

          THRESHOLD="${{ github.event.inputs.anomaly_threshold }}"
          THRESHOLD="${THRESHOLD:-0.10}"

          node scripts/sync-legislation.js $DRY_RUN_FLAG --threshold=$THRESHOLD

          echo "changed=${SYNC_CHANGED:-false}" >> $GITHUB_OUTPUT
          echo "anomaly=${SYNC_ANOMALY:-false}" >> $GITHUB_OUTPUT
          echo "anomaly_keys=${SYNC_ANOMALY_KEYS:-}" >> $GITHUB_OUTPUT

      - name: Check which files changed
        id: check_files
        run: |
          CHANGED_FILES=$(git diff --name-only)
          echo "files=${CHANGED_FILES}" >> $GITHUB_OUTPUT

          if git diff --quiet src/rules/tax-2026.json; then
            echo "tax_json_changed=false" >> $GITHUB_OUTPUT
          else
            echo "tax_json_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR — normal update (no anomalies)
        if: |
          steps.check_files.outputs.tax_json_changed == 'true' &&
          steps.sync.outputs.anomaly == 'false' &&
          github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/tax-sync-${{ steps.date.outputs.today }}
          commit-message: "tax-2026: auto-synced legislation ${{ steps.date.outputs.today }}"
          title: "⚡ UK tax rules synced — ${{ steps.date.outputs.today }}"
          body: |
            ## Auto-synced UK legislation parameters

            Claude searched HMRC and GOV.UK live and found changes since last run.

            **No anomalies detected** — changes are within the ${{ github.event.inputs.anomaly_threshold || '10' }}% threshold.

            **Review checklist:**
            - [ ] Check diff in `src/rules/tax-2026.json`
            - [ ] Confirm each changed value matches the cited source
            - [ ] Run `npm run build` locally to verify engine still compiles
            - [ ] Merge if correct

            > Auto-generated by `scripts/sync-legislation.js`
          labels: rules-update,automated
          draft: false

      - name: Create PR — anomaly detected (requires manual review)
        if: |
          steps.check_files.outputs.tax_json_changed == 'true' &&
          steps.sync.outputs.anomaly == 'true' &&
          github.event.inputs.dry_run != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/tax-sync-anomaly-${{ steps.date.outputs.today }}
          commit-message: "tax-2026: sync with anomaly flags ${{ steps.date.outputs.today }}"
          title: "🚨 ANOMALY — UK tax sync requires manual review — ${{ steps.date.outputs.today }}"
          body: |
            ## ⚠️ Anomaly detected — manual review REQUIRED before merge

            One or more parameters changed by more than the ${{ github.event.inputs.anomaly_threshold || '10' }}% anomaly threshold.

            **Affected parameters:** `${{ steps.sync.outputs.anomaly_keys }}`

            **This PR must NOT be auto-merged.** A human must:
            1. Verify each flagged parameter against the official GOV.UK / HMRC source
            2. Confirm the change is genuine (e.g. a Budget announcement) — not a data error
            3. Cross-check against `app-prototype/rules-uk.js` for consistency
            4. Approve and merge manually after verification

            **Consequences of merging wrong values:**
            - Incorrect Sonuswealth Wealth Score calculations for all users
            - Wrong IHT projections, pension AA calculations, CGT planning advice

            > Auto-generated by `scripts/sync-legislation.js`
          labels: rules-update,automated,anomaly-detected,requires-human-review
          draft: true

      - name: Log no-change result
        if: steps.check_files.outputs.tax_json_changed == 'false'
        run: |
          echo "✅ All UK tax parameters confirmed current as of ${{ steps.date.outputs.today }}."
          echo "tax-2026.json unchanged. No PR created."

      - name: Summary
        run: |
          echo "## Sync Result" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** ${{ steps.date.outputs.today }}" >> $GITHUB_STEP_SUMMARY
          echo "- **tax-2026.json changed:** ${{ steps.check_files.outputs.tax_json_changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Anomaly detected:** ${{ steps.sync.outputs.anomaly }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.sync.outputs.anomaly_keys }}" != "" ]; then
            echo "- **Anomaly keys:** ${{ steps.sync.outputs.anomaly_keys }}" >> $GITHUB_STEP_SUMMARY
          fi
